<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .slide { width: 100%; padding: 40px; background: #fff; }
    h1 { font-size: 2em; margin-top: 0; }
    .columns { display: flex; gap: 40px; }
    .column { flex: 1; }
    h2 { font-size: 1.3em; }
    ul { font-size: 1.1em; }
  </style>
</head>
<body>
  <div class="slide">
    <h1>Two Column Slide</h1>
    <div class="columns">
      <div class="column">
        <h2>Left Column</h2>
        <ul>
          <li>Point 1</li>
          <li>Point 2</li>
          <li>Point 3</li>
        </ul>
      </div>
      <div class="column">
        <h2>Right Column</h2>
        <ul>
          <li>Point A</li>
          <li>Point B</li>
          <li>Point C</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
