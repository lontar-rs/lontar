<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .slide { width: 100%; padding: 40px; background: #fff; }
    h1 { font-size: 2em; margin-top: 0; }
    .notes { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-top: 20px; }
    .notes h2 { font-size: 1.2em; }
  </style>
</head>
<body>
  <div class="slide">
    <h1>Slide with Speaker Notes</h1>
    <p>Main slide content.</p>
    <div class="notes">
      <h2>Speaker Notes</h2>
      <p>These are the speaker notes for this slide. They provide additional context and talking points for the presenter.</p>
    </div>
  </div>
</body>
</html>
