<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    header { border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
    footer { border-top: 1px solid #ccc; padding-top: 10px; margin-top: 20px; }
  </style>
</head>
<body>
  <header>Header text appears at the top of each page.</header>
  <main>
    <p>Document with header and footer.</p>
  </main>
  <footer>Footer text appears at the bottom of each page.</footer>
</body>
</html>
