<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    blockquote { border-left: 4px solid #ccc; padding-left: 15px; margin-left: 0; color: #666; }
  </style>
</head>
<body>
  <blockquote>
    <p>This is a block quote.<br>It can span multiple lines.</p>
  </blockquote>
  <blockquote>
    <p>This is a nested quote.</p>
    <blockquote>
      <p>Inner quote level 1</p>
      <blockquote>
        <p>Inner quote level 2</p>
      </blockquote>
    </blockquote>
  </blockquote>
</body>
</html>
