<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
  </style>
</head>
<body>
  <p>This is <strong>bold</strong> text.</p>
  <p>This is <em>italic</em> text.</p>
